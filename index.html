<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Card for Ritu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="envelope-lid"></div>
                <div class="card-wrapper">
                    <div class="card">
                        <div class="card-body">
                            <h2 class="card-title">Happy Valentine's Day!</h2>
                            <p class="story-text">
                                To my love, From the moment I first saw you, I knew I wanted to smell your farts forever. 
                                Hand's to a lifetime of love, laughter, and questionable air quality.
                            </p>
                            <h3 class="love-you">I LOVE YOU RITU</h3>
                            <p class="signature">From: Boss Enaful</p>
                        </div>
                    </div>
                </div>
                <div class="envelope-front"></div>
                <div class="heart-seal"></div>
            </div>
        </div>
    </div>
</body>
</html>
