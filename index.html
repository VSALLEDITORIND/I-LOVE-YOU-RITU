<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Card - Boss Enaful</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="envelope-wrapper">
            <div class="envelope">
                <div class="envelope-lid"></div>
                <div class="card-wrapper">
                    <div class="card">
                        <div class="card-body">
                            <h2 class="card-title">Happy Valentine's Day!</h2>
                            <p>To my Love, Ritu</p>
                            <p>You make my world special every day.</p>
                            <p class="signature">From: Boss Enaful</p>
                        </div>
                    </div>
                </div>
                <div class="heart-seal"></div>
            </div>
        </div>
    </div>
</body>
</html>
